<body>
    <div id="app">
        <!--<div class="spinner-border text-info" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>-->

            <div class="dot"></div>

            <div class="dot"></div>
        </div>

    </div>

        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/Radzen.Blazor/Radzen.Blazor.js"></script>
    <script src="js/culture.js"></script>
    <script src="js/update-svg.js?v=1.8"></script>
    <script src="js/dropdown-helper.js?v=1.3"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="js/videoPlayer.js?v=1.1"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>
    <script src="js/reservoirChart.js?v=1.3"></script>

    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            const themeLink = document.getElementById('radzen-theme');
            themeLink.href = `_content/Radzen.Blazor/css/material${theme === 'dark' ? '-dark' : ''}-base.css`;
        })();

        window.setTheme = (theme) => {
            console.log(`[Theme] Setting theme to: ${theme}`);
            localStorage.setItem('theme', theme);
            const themeLink = document.getElementById('radzen-theme');
            if (themeLink) {
                const newHref = `_content/Radzen.Blazor/css/material${theme === 'dark' ? '-dark' : ''}-base.css`;
                console.log(`[Theme] New CSS href: ${newHref}`);
                themeLink.href = newHref;
            } else {
                console.error('[Theme] Error: Could not find element with id #radzen-theme.');
            }
        };
    </script>
</body>

</html>
